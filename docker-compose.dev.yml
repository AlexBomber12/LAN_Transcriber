services:
  db:
    volumes:
      - ./:/app
      - lan_cache:/root/.cache
      - hf-cache:/data/hf
      - /opt/lan_cache/ollama:/root/.ollama
      - ./data:/data

  api:
    command:
      [
        "uvicorn",
        "lan_app.api:app",
        "--host",
        "0.0.0.0",
        "--port",
        "7860",
        "--reload",
        "--reload-dir",
        "/app/lan_app",
        "--reload-dir",
        "/app/lan_transcriber",
      ]
    environment:
      - HF_HOME=${HF_HOME:-/data/hf}
      - TRANSFORMERS_CACHE=${TRANSFORMERS_CACHE:-/data/hf/transformers}
    volumes:
      - ./:/app
      - lan_cache:/root/.cache
      - hf-cache:/data/hf
      - /opt/lan_cache/ollama:/root/.ollama
      - ./data:/data

  worker:
    gpus: all
    environment:
      - HF_HOME=${HF_HOME:-/data/hf}
      - TRANSFORMERS_CACHE=${TRANSFORMERS_CACHE:-/data/hf/transformers}
    volumes:
      - ./:/app
      - lan_cache:/root/.cache
      - hf-cache:/data/hf
      - /opt/lan_cache/ollama:/root/.ollama
      - ./data:/data
