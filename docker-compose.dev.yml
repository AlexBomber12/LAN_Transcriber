services:
  db:
    volumes:
      - ./:/app

  api:
    command:
      [
        "uvicorn",
        "lan_app.api:app",
        "--host",
        "0.0.0.0",
        "--port",
        "7860",
        "--reload",
        "--reload-dir",
        "/app/lan_app",
        "--reload-dir",
        "/app/lan_transcriber",
      ]
    environment:
      - HF_HOME=${HF_HOME:-/data/hf}
      - TRANSFORMERS_CACHE=${TRANSFORMERS_CACHE:-/data/hf/transformers}
    volumes:
      - ./:/app

  worker:
    environment:
      - HF_HOME=${HF_HOME:-/data/hf}
      - TRANSFORMERS_CACHE=${TRANSFORMERS_CACHE:-/data/hf/transformers}
    volumes:
      - ./:/app
