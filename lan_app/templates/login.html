{% extends "base.html" %}
{% from "partials/macros.html" import btn_classes %}
{% block title %}Login - LAN Transcriber{% endblock %}
{% block content %}
<h1 class="text-3xl font-extrabold tracking-tight mb-5">Login</h1>
<div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm max-w-[420px]">
  <h3 class="text-sm font-bold mb-2">API token required</h3>
  <p class="text-sm mb-2">Enter the bearer token to unlock protected actions.</p>
  {% if error %}
  <p class="text-sm mb-2 text-red-700">{{ error }}</p>
  {% endif %}
  <form method="post" action="/ui/login">
    <input type="hidden" name="next" value="{{ next }}">
    <div class="flex gap-2.5 items-center mb-2.5 flex-wrap">
      <label for="token" class="text-xs min-w-[120px] text-slate-500 font-bold">Token</label>
      <input id="token" name="token" type="password" required autocomplete="off" class="w-[260px] border border-slate-300 bg-white text-slate-900 rounded-xl px-3 py-2.5 min-h-[40px] text-sm focus:outline-none focus:border-primary/55 focus:ring-4 focus:ring-primary/10">
    </div>
    <div class="flex gap-2.5 items-center mb-2.5 flex-wrap">
      <label class="text-xs min-w-[120px] text-slate-500 font-bold"></label>
      <button type="submit" class="{{ btn_classes() }}">Log in</button>
    </div>
  </form>
</div>
{% endblock %}
