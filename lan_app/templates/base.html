<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}LAN Transcriber{% endblock %}</title>
<script src="/static/htmx.min.js"></script>
<script src="/static/tailwind.js"></script>
<style>
@font-face {
  font-family: 'Inter';
  font-style: normal;
  font-weight: 400 900;
  font-display: swap;
  src: url(/static/fonts/inter-latin.woff2) format('woff2');
  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
}
@font-face {
  font-family: 'Material Symbols Outlined';
  font-style: normal;
  font-weight: 100 700;
  font-display: swap;
  src: url(/static/fonts/material-symbols-outlined.woff2) format('woff2');
}
.material-symbols-outlined {
  font-family: 'Material Symbols Outlined';
  font-weight: normal;
  font-style: normal;
  font-size: 20px;
  line-height: 1;
  letter-spacing: normal;
  text-transform: none;
  display: inline-block;
  white-space: nowrap;
  word-wrap: normal;
  direction: ltr;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  font-feature-settings: 'liga';
}
</style>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#2463eb",
        "background-light": "#f6f6f8",
        "background-dark": "#111621",
        "navy-nav": "#0f172a",
      },
      fontFamily: {
        "display": ["Inter"]
      },
      borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
    },
  },
}
</script>
<style>
/* Minimal non-Tailwind rules */
body { font-family: 'Inter', sans-serif; }
a { color: inherit; }
[hidden] { display: none !important; }
</style>
</head>
<body class="font-display antialiased" hx-boost="true">
<header class="bg-navy-nav text-white px-6 py-3 flex flex-wrap items-center justify-between gap-3 border-b border-slate-800">
  <div class="flex flex-wrap items-center gap-4 md:gap-8">
    <div class="flex items-center gap-3">
      <div class="bg-primary p-1.5 rounded">
        <span class="material-symbols-outlined text-white">settings_input_component</span>
      </div>
      <h1 class="text-lg font-bold tracking-tight">LAN Transcriber</h1>
    </div>
    <nav class="flex flex-wrap items-center gap-1">
      <a href="/" class="px-3 py-1.5 rounded text-sm font-semibold {% if active in ['dashboard', 'recordings', 'upload'] %}bg-primary/20 text-primary{% else %}text-slate-400 hover:text-white{% endif %}">Control Center</a>
      <a href="/glossary" class="px-3 py-1.5 rounded text-sm font-medium {% if active=='glossary' %}bg-primary/20 text-primary{% else %}text-slate-400 hover:text-white{% endif %}">Corrections</a>
      <a href="/voices" class="px-3 py-1.5 rounded text-sm font-medium {% if active=='voices' %}bg-primary/20 text-primary{% else %}text-slate-400 hover:text-white{% endif %}">Voices</a>
      <a href="/calendars" class="px-3 py-1.5 rounded text-sm font-medium {% if active=='calendars' %}bg-primary/20 text-primary{% else %}text-slate-400 hover:text-white{% endif %}">Calendars</a>
      <a href="/projects" class="px-3 py-1.5 rounded text-sm font-medium {% if active=='projects' %}bg-primary/20 text-primary{% else %}text-slate-400 hover:text-white{% endif %}">Projects</a>
      <a href="/queue" class="px-3 py-1.5 rounded text-sm font-medium {% if active=='queue' %}bg-primary/20 text-primary{% else %}text-slate-400 hover:text-white{% endif %}">Queue</a>
    </nav>
  </div>
  <div class="flex items-center gap-4">
    <div class="relative hidden md:block">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">search</span>
      <input class="bg-slate-800 border-none rounded-lg pl-10 pr-4 py-1.5 text-sm w-64 focus:ring-1 focus:ring-primary" placeholder="Search recordings..." type="text">
    </div>
    <button class="p-2 text-slate-400 hover:text-white"><span class="material-symbols-outlined">notifications</span></button>
    <div class="w-8 h-8 rounded-full bg-primary/30 flex items-center justify-center border border-primary/50">
      <span class="text-xs font-bold">OP</span>
    </div>
  </div>
</header>
<main class="max-w-[1600px] mx-auto px-[clamp(18px,3vw,32px)] py-6 pb-10">
{% block content %}{% endblock %}
</main>
<footer class="h-8 bg-slate-100 border-t border-slate-200 px-4 flex items-center justify-between text-[10px] font-medium text-slate-500">
  <div class="flex gap-4">
    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-500"></span> LAN Node: Online</span>
    <span>Local Database</span>
    <span>Version: LAN Transcriber</span>
  </div>
  <div class="flex gap-4">
    <span>Uptime</span>
  </div>
</footer>
<div
  id="delete-confirm-backdrop"
  class="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-3 z-[1000]"
  hidden
  onclick="if (event.target === this) closeDeleteDialog();"
>
  <div class="bg-white border border-slate-200 rounded-3xl max-w-[460px] w-full p-5 shadow-2xl" role="dialog" aria-modal="true" aria-labelledby="delete-confirm-title">
    <h2 id="delete-confirm-title" class="text-lg font-bold mb-2">Delete record?</h2>
    <p class="text-sm text-slate-900 mb-2">This action can&apos;t be undone.</p>
    <p id="delete-confirm-context" class="text-sm text-slate-500 mb-3 break-words"></p>
    <p id="delete-confirm-error" class="text-xs text-red-700 min-h-[18px] mb-2"></p>
    <div class="flex justify-end gap-1.5">
      <button id="delete-cancel-btn" class="inline-flex items-center justify-center gap-2 min-h-[40px] px-3.5 py-2 border border-slate-300 rounded-full bg-white text-slate-900 cursor-pointer text-[13px] font-bold no-underline hover:bg-slate-50 transition-colors" type="button" onclick="closeDeleteDialog()">Cancel</button>
      <button id="delete-confirm-btn" class="inline-flex items-center justify-center gap-2 min-h-[40px] px-3.5 py-2 border border-red-200 rounded-full text-red-700 bg-red-50 cursor-pointer text-[13px] font-bold no-underline hover:bg-red-100 transition-colors" type="button" onclick="confirmDeleteDialog()">Delete</button>
    </div>
  </div>
</div>
<script>
var deleteDialogState = {recordingId: '', inFlight: false, returnFocus: null, returnTo: ''};

function syncControlCenterShellRefreshUrlsFromPanel() {
  var panel = document.getElementById('control-center-recordings-panel');
  if (!panel) {
    return;
  }
  var systemBarUrl = panel.getAttribute('data-system-bar-url');
  var systemBar = document.getElementById('control-center-system-bar');
  if (systemBar && systemBarUrl) {
    systemBar.setAttribute('hx-get', systemBarUrl);
  }
}

function syncControlCenterShellRefreshUrlsFromStateParams(stateParams) {
  if (!stateParams) {
    return;
  }
  var normalizedParams = new URLSearchParams();
  normalizedParams.set('selected', stateParams.get('selected') || '');
  normalizedParams.set('status', stateParams.get('status') || '');
  normalizedParams.set('q', stateParams.get('q') || '');
  normalizedParams.set('tab', stateParams.get('tab') || 'overview');
  normalizedParams.set('limit', stateParams.get('limit') || '25');
  normalizedParams.set('offset', stateParams.get('offset') || '0');
  var systemBarUrl = '/ui/control-center/system-bar?' + normalizedParams.toString();
  var panel = document.getElementById('control-center-recordings-panel');
  var systemBar = document.getElementById('control-center-system-bar');
  if (panel) {
    panel.setAttribute('data-system-bar-url', systemBarUrl);
  }
  if (systemBar) {
    systemBar.setAttribute('hx-get', systemBarUrl);
  }
}

function syncControlCenterShellRefreshUrlsFromHref(href) {
  if (!href) {
    syncControlCenterShellRefreshUrlsFromStateParams(new URLSearchParams(window.location.search || ''));
    return;
  }
  syncControlCenterShellRefreshUrlsFromStateParams(
    new URL(href, window.location.origin).searchParams
  );
}

function refreshControlCenterShellFromPanel() {
  syncControlCenterShellRefreshUrlsFromPanel();
  if (!window.htmx || !document.body) {
    return;
  }
  htmx.trigger(document.body, 'refresh-control-center-system-bar');
}

function refreshControlCenterShellFromHref(href) {
  syncControlCenterShellRefreshUrlsFromHref(href);
  if (!window.htmx || !document.body) {
    return;
  }
  htmx.trigger(document.body, 'refresh-control-center-system-bar');
}

if (document.body && !window.__controlCenterShellAfterSwapBound) {
  document.body.addEventListener('htmx:afterSwap', function (event) {
    var target = event && event.detail ? event.detail.target : null;
    if (!target) {
      return;
    }
    if (target.id === 'control-center-recordings-panel') {
      refreshControlCenterShellFromPanel();
      return;
    }
    if (target.id !== 'control-center-inspector-pane') {
      return;
    }
    var activeTab = target.querySelector('.tab.active');
    refreshControlCenterShellFromHref(activeTab ? activeTab.getAttribute('href') : '');
  });
  window.__controlCenterShellAfterSwapBound = true;
}

function refreshControlCenterPanels(options) {
  var params = new URLSearchParams(window.location.search || '');
  if (
    options &&
    options.clearSelected &&
    params.get('selected') === options.clearSelected
  ) {
    params.delete('selected');
    window.location = params.toString() ? ('/?' + params.toString()) : '/';
    return;
  }
  if (!window.htmx || !document.body) {
    return;
  }
  htmx.trigger(document.body, 'refresh-control-center-recordings');
  htmx.trigger(document.body, 'refresh-control-center-summary');
  htmx.trigger(document.body, 'refresh-control-center-inspector');
}

function recordingActionUrl(recordingId, action, returnTo) {
  var url = '/ui/recordings/' + encodeURIComponent(recordingId) + '/' + action;
  if (returnTo) {
    url += '?return_to=' + encodeURIComponent(returnTo);
  }
  return url;
}

function _deleteDialogElements() {
  return {
    backdrop: document.getElementById('delete-confirm-backdrop'),
    context: document.getElementById('delete-confirm-context'),
    error: document.getElementById('delete-confirm-error'),
    cancelBtn: document.getElementById('delete-cancel-btn'),
    confirmBtn: document.getElementById('delete-confirm-btn')
  };
}

function _deleteDialogContext(meta) {
  var details = [];
  if (meta.recordingLabel) details.push(meta.recordingLabel);
  if (meta.capturedAt) details.push(meta.capturedAt);
  details.push('ID: ' + meta.recordingId);
  return details.join(' | ');
}

function openDeleteDialog(meta) {
  if (!meta || !meta.recordingId) return;
  var el = _deleteDialogElements();
  if (!el.backdrop) return;
  deleteDialogState.recordingId = meta.recordingId;
  deleteDialogState.inFlight = false;
  deleteDialogState.returnFocus = meta.returnFocus || null;
  deleteDialogState.returnTo = meta.returnTo || '';
  el.context.textContent = _deleteDialogContext(meta);
  el.error.textContent = '';
  el.confirmBtn.disabled = false;
  el.cancelBtn.disabled = false;
  el.confirmBtn.textContent = 'Delete';
  el.backdrop.hidden = false;
  window.setTimeout(function() {
    el.cancelBtn.focus();
  }, 0);
}

function closeDeleteDialog() {
  var el = _deleteDialogElements();
  if (!el.backdrop || deleteDialogState.inFlight) return;
  var focusTarget = deleteDialogState.returnFocus;
  el.backdrop.hidden = true;
  deleteDialogState.recordingId = '';
  deleteDialogState.returnFocus = null;
  deleteDialogState.returnTo = '';
  if (focusTarget && typeof focusTarget.focus === 'function') {
    focusTarget.focus();
  }
}

function confirmDeleteDialog() {
  var el = _deleteDialogElements();
  if (!deleteDialogState.recordingId || deleteDialogState.inFlight) return;
  var targetId = deleteDialogState.recordingId;
  deleteDialogState.inFlight = true;
  el.error.textContent = '';
  el.confirmBtn.disabled = true;
  el.cancelBtn.disabled = true;
  el.confirmBtn.textContent = 'Deleting...';

  fetch(recordingActionUrl(targetId, 'delete', deleteDialogState.returnTo), {
    method: 'POST',
    headers: {'HX-Request': 'true'}
  })
    .then(function(resp) {
      return resp.text().then(function(body) {
        return {resp: resp, body: body};
      });
    })
    .then(function(result) {
      if (!result.resp.ok) {
        throw new Error(result.body || ('Delete failed (' + result.resp.status + ').'));
      }
      if (deleteDialogState.returnTo === 'control-center') {
        var deletedRecordingId = deleteDialogState.recordingId;
        deleteDialogState.inFlight = false;
        el.backdrop.hidden = true;
        deleteDialogState.recordingId = '';
        deleteDialogState.returnFocus = null;
        deleteDialogState.returnTo = '';
        refreshControlCenterPanels({clearSelected: deletedRecordingId});
        return;
      }
      var redirect = result.resp.headers.get('HX-Redirect');
      if (redirect) {
        window.location = redirect;
        return;
      }
      window.location = '/recordings';
    })
    .catch(function(err) {
      deleteDialogState.inFlight = false;
      el.confirmBtn.disabled = false;
      el.cancelBtn.disabled = false;
      el.confirmBtn.textContent = 'Delete';
      el.error.textContent = err && err.message ? err.message : 'Delete failed.';
      el.cancelBtn.focus();
    });
}

if (!window.__deleteDialogEscapeBound) {
  document.addEventListener('keydown', function(evt) {
    var el = _deleteDialogElements();
    if (evt.key === 'Escape' && el.backdrop && !el.backdrop.hidden) {
      evt.preventDefault();
      closeDeleteDialog();
    }
  });
  window.__deleteDialogEscapeBound = true;
}

function postControlCenterAction(sel, action) {
  var id = sel.dataset.rid;
  var returnTo = sel.dataset.returnTo || '';
  if (!id || !returnTo) {
    return;
  }
  sel.disabled = true;
  fetch(recordingActionUrl(id, action, returnTo), {
    method: 'POST',
    headers: {'HX-Request': 'true'}
  })
    .then(function(resp) {
      return resp.text().then(function(body) {
        return {resp: resp, body: body};
      });
    })
    .then(function(result) {
      if (!result.resp.ok) {
        throw new Error(result.body || ('Action failed (' + result.resp.status + ').'));
      }
      refreshControlCenterPanels();
    })
    .catch(function(err) {
      window.alert(err && err.message ? err.message : 'Action failed.');
    })
    .finally(function() {
      sel.disabled = false;
    });
}

function triggerRecordingAction(btn) {
  if (!btn || btn.disabled) return;
  var url = btn.dataset.actionUrl || '';
  if (!url) return;
  var confirmMessage = btn.dataset.confirmMessage || '';
  if (confirmMessage && !confirm(confirmMessage)) {
    return;
  }
  var returnTo = btn.dataset.returnTo || '';
  var body = btn.dataset.actionBody || '';
  var headers = {'HX-Request': 'true'};
  if (body) {
    headers['Content-Type'] = 'application/x-www-form-urlencoded';
  }
  var originalText = btn.textContent;
  var pendingLabel = btn.dataset.pendingLabel || originalText;
  btn.disabled = true;
  btn.textContent = pendingLabel;
  fetch(url, {
    method: 'POST',
    headers: headers,
    body: body || undefined
  })
    .then(function(resp) {
      return resp.text().then(function(payload) {
        return {resp: resp, body: payload};
      });
    })
    .then(function(result) {
      if (!result.resp.ok) {
        throw new Error(result.body || ('Action failed (' + result.resp.status + ').'));
      }
      if (returnTo === 'control-center') {
        refreshControlCenterPanels();
        return;
      }
      var redirect = result.resp.headers.get('HX-Redirect');
      if (redirect) {
        window.location = redirect;
        return;
      }
      window.location.reload();
    })
    .catch(function(err) {
      window.alert(err && err.message ? err.message : 'Action failed.');
    })
    .finally(function() {
      if (document.body.contains(btn)) {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    });
}

function handleRecordingActionChoice(control, act) {
  var id = control.dataset.rid;
  if (!act || !id) return;
  if (act === 'open') {
    window.location = control.dataset.openHref || ('/recordings/' + encodeURIComponent(id));
    return;
  }
  if (act === 'delete') {
    openDeleteDialog({
      recordingId: id,
      recordingLabel: control.dataset.rlabel || '',
      capturedAt: control.dataset.rcaptured || '',
      returnTo: control.dataset.returnTo || '',
      returnFocus: control
    });
    return;
  } else if (act === 'quarantine' && !confirm('Quarantine this recording?')) {
    return;
  }
  if (control.dataset.returnTo === 'control-center') {
    postControlCenterAction(control, act);
    return;
  }
  htmx.ajax('POST', '/ui/recordings/' + encodeURIComponent(id) + '/' + act, {swap: 'none'});
}

function activateControlCenterRecordingRow(row, event) {
  if (!row || !row.dataset.selectHref) {
    return;
  }
  var target = event && event.target;
  if (
    target &&
    target.closest('a, button, summary, details, select, option, input, textarea, [data-recording-actions]')
  ) {
    return;
  }
  window.location = row.dataset.selectHref;
}

function activateControlCenterRecordingRowFromKey(row, event) {
  if (!event || (event.key !== 'Enter' && event.key !== ' ')) {
    return;
  }
  var target = event.target;
  if (
    target &&
    target.closest('a, button, summary, details, select, option, input, textarea, [data-recording-actions]')
  ) {
    return;
  }
  event.preventDefault();
  activateControlCenterRecordingRow(row, event);
}

function runRecordingActionFromMenu(button, act) {
  var menu = button ? button.closest('details') : null;
  if (menu) {
    menu.removeAttribute('open');
  }
  handleRecordingActionChoice(button, act);
}

function doRecAction(sel) {
  var act = sel.value;
  sel.value = '';
  handleRecordingActionChoice(sel, act);
}
</script>
</body>
</html>
