<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}LAN Transcriber{% endblock %}</title>
<script src="/static/htmx.min.js"></script>
<style>
:root{
  --bg:#f6f6f8;
  --bg-accent:#eef3ff;
  --panel:#ffffff;
  --panel-soft:#f8fafc;
  --line:#d9e2ef;
  --line-strong:#c2cedf;
  --navy:#0f172a;
  --navy-soft:#1e293b;
  --text:#0f172a;
  --muted:#5f7086;
  --subtle:#8ea0ba;
  --primary:#2463eb;
  --primary-soft:#e8f0ff;
  --danger:#b91c1c;
  --warning:#b45309;
  --success:#166534;
  --shadow:0 18px 40px rgba(15,23,42,.08);
  --shadow-soft:0 8px 18px rgba(15,23,42,.06);
  --radius:18px;
  --radius-sm:12px;
}
*{box-sizing:border-box}
html{min-height:100%}
body{
  margin:0;
  min-height:100vh;
  font:14px/1.5 Inter,"Segoe UI","Helvetica Neue",Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(36,99,235,.12), transparent 28%),
    linear-gradient(180deg, #f9fafc 0%, var(--bg) 42%, #eef2f8 100%);
}
a{color:inherit}
code,pre,textarea,input,select,button{font:inherit}
.app-nav{
  position:sticky;
  top:0;
  z-index:50;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:18px;
  padding:18px clamp(18px,3vw,32px);
  background:rgba(15,23,42,.96);
  border-bottom:1px solid rgba(148,163,184,.18);
  backdrop-filter:blur(18px);
}
.app-nav-brand{
  display:flex;
  align-items:center;
  gap:14px;
  min-width:0;
}
.app-nav-mark{
  display:grid;
  place-items:center;
  width:42px;
  height:42px;
  border-radius:14px;
  background:linear-gradient(135deg, var(--primary) 0%, #173f99 100%);
  color:#fff;
  font-size:13px;
  font-weight:800;
  letter-spacing:.12em;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
}
.app-nav-copy{display:grid;gap:2px}
.app-nav-title{color:#fff;font-size:18px;font-weight:700;letter-spacing:-.02em}
.app-nav-subtitle{color:#94a3b8;font-size:12px}
.app-nav-links{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.app-nav-link{
  color:#9fb0c8;
  text-decoration:none;
  padding:10px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
  transition:background .16s ease,color .16s ease,border-color .16s ease;
  border:1px solid transparent;
}
.app-nav-link:hover,
.app-nav-link.active{
  color:#fff;
  background:rgba(36,99,235,.18);
  border-color:rgba(96,165,250,.3);
}
.app-nav-link-primary{
  color:#fff;
  background:rgba(255,255,255,.06);
  border-color:rgba(148,163,184,.16);
}
.app-main{
  width:min(1600px,100%);
  margin:0 auto;
  padding:24px clamp(18px,3vw,32px) 40px;
}
h1,h2,h3{margin:0}
h1{
  font-size:clamp(1.7rem,2.1vw,2.35rem);
  line-height:1.08;
  letter-spacing:-.04em;
  font-weight:800;
}
h2{font-size:1rem;font-weight:700;letter-spacing:-.02em}
h3{font-size:.88rem;font-weight:700}
p{margin:0}
pre{
  background:var(--panel-soft);
  border:1px solid var(--line);
  border-radius:var(--radius-sm);
  padding:14px 16px;
  overflow:auto;
  white-space:pre-wrap;
}
table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  font-size:13px;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:16px;
  overflow:hidden;
  box-shadow:var(--shadow-soft);
}
th{
  background:#f8fafc;
  color:var(--muted);
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.08em;
  padding:12px 14px;
  text-align:left;
  border-bottom:1px solid var(--line);
  white-space:nowrap;
  user-select:none;
}
td{
  padding:14px;
  border-bottom:1px solid #edf2f7;
  vertical-align:top;
  white-space:nowrap;
  overflow:hidden;
  max-width:260px;
  text-overflow:ellipsis;
}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#f8fbff}
.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:4px 10px;
  border:1px solid;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  line-height:1.1;
  white-space:nowrap;
  letter-spacing:.04em;
  text-transform:uppercase;
}
.s-Queued{background:#dbeafe;border-color:#93c5fd;color:#1d4ed8}
.s-Processing{background:#fef3c7;border-color:#fcd34d;color:#92400e}
.s-Stopping{background:#fed7aa;border-color:#fb923c;color:#9a3412}
.s-Stopped{background:#e5e7eb;border-color:#9ca3af;color:#374151}
.s-NeedsReview{background:#fef9c3;border-color:#fde047;color:#713f12}
.s-Ready{background:#dcfce7;border-color:#86efac;color:#14532d}
.s-Published{background:#ede9fe;border-color:#c4b5fd;color:#4c1d95}
.s-Quarantine{background:#fee2e2;border-color:#fca5a5;color:#7f1d1d}
.s-Failed{background:#fee2e2;border-color:#fca5a5;color:#7f1d1d}
.s-queued{background:#dbeafe;border-color:#93c5fd;color:#1d4ed8}
.s-started{background:#fef3c7;border-color:#fcd34d;color:#92400e}
.s-finished{background:#dcfce7;border-color:#86efac;color:#14532d}
.s-failed{background:#fee2e2;border-color:#fca5a5;color:#7f1d1d}
.filters{
  margin:0;
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}
.filters label{
  font-size:12px;
  font-weight:600;
  color:var(--muted);
}
.filters select,
.filters input,
.form-row input,
.form-row select,
.form-row textarea,
.action-sel,
textarea{
  border:1px solid var(--line-strong);
  background:#fff;
  color:var(--text);
  border-radius:12px;
  padding:10px 12px;
  min-height:40px;
  transition:border-color .16s ease,box-shadow .16s ease,background .16s ease;
}
.filters select:focus,
.filters input:focus,
.form-row input:focus,
.form-row select:focus,
.form-row textarea:focus,
textarea:focus{
  outline:none;
  border-color:rgba(36,99,235,.55);
  box-shadow:0 0 0 4px rgba(36,99,235,.12);
}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  min-height:40px;
  padding:9px 14px;
  border:1px solid var(--line-strong);
  border-radius:999px;
  background:#fff;
  color:var(--text);
  cursor:pointer;
  font-size:13px;
  font-weight:700;
  text-decoration:none;
  transition:background .16s ease,border-color .16s ease,transform .16s ease,color .16s ease;
}
.btn:hover{background:#f8fbff;border-color:#9db4da;transform:translateY(-1px)}
.btn-danger{border-color:#fecaca;color:var(--danger);background:#fff5f5}
.btn-danger:hover{background:#fee2e2}
.pager{
  margin-top:14px;
  display:flex;
  gap:10px;
  align-items:center;
  justify-content:flex-end;
  flex-wrap:wrap;
  font-size:12px;
  color:var(--muted);
}
.pager a{
  text-decoration:none;
  padding:9px 12px;
  border:1px solid var(--line-strong);
  border-radius:999px;
  background:#fff;
  color:var(--text);
  font-weight:700;
}
.stats-row{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  margin-bottom:14px;
}
.stat-card{
  background:var(--panel-soft);
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px 14px;
  min-width:0;
  box-shadow:var(--shadow-soft);
}
.stat-card .num{font-size:24px;font-weight:800;line-height:1.1}
.stat-card .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.stat-card-link{display:block;text-decoration:none;color:inherit}
.stat-card-link:hover{border-color:#9db4da;background:#f5f9ff}
.stat-card-active{border-color:#84a9f8;background:var(--primary-soft)}
.section{margin-bottom:18px}
.tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  border-bottom:1px solid var(--line);
  padding-bottom:12px;
}
.tabs-embedded{
  gap:22px;
  flex-wrap:nowrap;
  overflow:auto;
  padding-bottom:0;
}
.tab{
  padding:9px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
  text-decoration:none;
  color:var(--muted);
  background:transparent;
  border:1px solid transparent;
}
.tab:hover{color:var(--text);background:#f5f8fc;border-color:var(--line)}
.tab.active{background:var(--primary-soft);border-color:#b8cdfb;color:var(--primary)}
.tab-embedded{
  padding:0 0 12px;
  border-radius:0;
  border:none;
  border-bottom:2px solid transparent;
  background:transparent;
  white-space:nowrap;
}
.tab-embedded:hover{
  background:transparent;
  border-color:transparent;
  color:var(--text);
}
.tab-embedded.active{
  background:transparent;
  border-color:#84a9f8;
  color:var(--text);
}
.tab-content{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:0 0 var(--radius) var(--radius);
  padding:18px;
  box-shadow:var(--shadow-soft);
}
.placeholder{
  color:var(--muted);
  font-style:italic;
  padding:20px 0;
}
.info-grid{
  display:grid;
  grid-template-columns:minmax(140px,180px) minmax(0,1fr);
  gap:8px 14px;
  font-size:13px;
}
.info-grid .k{color:var(--muted);font-weight:600}
.info-grid .v{color:var(--text)}
.form-row{
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:10px;
  flex-wrap:wrap;
}
.form-row label{
  font-size:12px;
  min-width:120px;
  color:var(--muted);
  font-weight:700;
}
.action-sel{
  min-height:38px;
  padding:8px 10px;
  cursor:pointer;
}
.conn-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  margin-bottom:12px;
  max-width:560px;
  box-shadow:var(--shadow-soft);
}
.conn-card h3{margin-bottom:8px}
.conn-row{display:flex;gap:8px;align-items:center;font-size:13px;margin-bottom:6px}
.dot-ok{display:inline-block;width:8px;height:8px;border-radius:50%;background:#4ade80}
.dot-warn{display:inline-block;width:8px;height:8px;border-radius:50%;background:#f59e0b}
.dot-err{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ef4444}
.dot-na{display:inline-block;width:8px;height:8px;border-radius:50%;background:#d1d5db}
.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.58);display:flex;align-items:center;justify-content:center;padding:12px;z-index:1000}
.modal-backdrop[hidden]{display:none}
.modal{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:24px;
  max-width:460px;
  width:100%;
  padding:20px;
  box-shadow:0 24px 60px rgba(0,0,0,.24);
}
.modal h2{margin:0 0 8px 0;font-size:18px}
.modal-copy{font-size:13px;color:var(--text);margin-bottom:8px}
.modal-context{font-size:13px;color:var(--muted);margin-bottom:12px;white-space:normal;word-break:break-word}
.modal-error{font-size:12px;color:var(--danger);min-height:18px;margin-bottom:8px}
.modal-actions{display:flex;justify-content:flex-end;gap:6px}
.eyebrow{
  color:var(--primary);
  font-size:11px;
  font-weight:800;
  letter-spacing:.12em;
  text-transform:uppercase;
}
.muted{color:var(--muted)}
.control-center-shell{
  display:grid;
  gap:18px;
  padding-bottom:92px;
}
.control-center-workspace-header{
  display:grid;
  gap:16px;
  grid-template-columns:minmax(0,1.08fr) minmax(320px,.92fr);
  align-items:start;
}
.control-center-workspace-copy{
  display:grid;
  gap:10px;
}
.control-center-workspace-copy p:last-child{
  color:var(--muted);
  max-width:68ch;
}
.control-center-focus-card{
  display:grid;
  gap:14px;
  padding:18px 20px;
  border:1px solid #d6e2f5;
  border-radius:24px;
  background:linear-gradient(180deg, #ffffff 0%, #f2f7ff 100%);
  box-shadow:var(--shadow-soft);
}
.control-center-focus-topline{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}
.control-center-focus-label{
  font-size:11px;
  font-weight:800;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--muted);
}
.control-center-focus-state{
  display:inline-flex;
  align-items:center;
  padding:5px 10px;
  border-radius:999px;
  border:1px solid #d7e3f8;
  background:#fff;
  color:var(--muted);
  font-size:11px;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.control-center-focus-state.active{
  background:var(--primary-soft);
  border-color:#bdd1f8;
  color:var(--primary);
}
.control-center-focus-title{
  font-size:1.05rem;
  line-height:1.2;
  letter-spacing:-.02em;
}
.control-center-focus-copy{
  color:var(--muted);
  font-size:13px;
}
.control-center-focus-pills{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.control-center-focus-pill{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid #d8e3f7;
  background:#f8fbff;
  color:var(--navy-soft);
  font-size:12px;
  font-weight:700;
}
.control-center-focus-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.control-center-pane,
.control-center-panel{
  background:rgba(255,255,255,.94);
  border:1px solid rgba(217,226,239,.92);
  border-radius:26px;
  padding:18px;
  min-width:0;
  box-shadow:var(--shadow);
  backdrop-filter:blur(14px);
}
.control-center-main{
  display:grid;
  gap:18px;
  grid-template-columns:minmax(0,1.08fr) minmax(360px,.92fr);
  align-items:start;
}
.control-center-work-column{
  display:grid;
  gap:18px;
  min-width:0;
}
.control-center-inspector-pane{
  position:sticky;
  top:94px;
  min-height:calc(100vh - 170px);
  align-content:start;
}
.control-center-pane-head{
  display:flex;
  justify-content:space-between;
  gap:14px;
  align-items:flex-start;
  flex-wrap:wrap;
  margin-bottom:14px;
}
.control-center-pane-head-tight{margin-bottom:12px}
.control-center-pane-copy{color:var(--muted);max-width:62ch}
.control-center-empty-state{
  display:grid;
  gap:8px;
  min-height:220px;
  align-content:center;
  justify-items:start;
}
.control-center-empty-card{
  width:min(100%, 420px);
  display:grid;
  gap:10px;
  padding:24px;
  border-radius:24px;
  border:1px solid var(--line);
  background:linear-gradient(180deg, #ffffff 0%, #f6f9fe 100%);
  box-shadow:var(--shadow-soft);
}
.control-center-empty-state strong{
  font-size:1.05rem;
  font-style:normal;
  color:var(--text);
}
.control-center-empty-copy{
  margin:0;
  color:var(--muted);
  max-width:32ch;
}
.control-center-empty-hints{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.control-center-empty-hint{
  display:inline-flex;
  align-items:center;
  padding:7px 10px;
  border-radius:999px;
  border:1px solid #d8e3f5;
  background:#f8fbff;
  color:#5c6f8d;
  font-size:12px;
  font-weight:700;
}
.control-center-compact-card{
  border:1px solid var(--line);
  background:var(--panel-soft);
  border-radius:18px;
  padding:16px;
}
.control-center-compact-grid{
  display:grid;
  gap:10px;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
}
.control-center-upload-card{
  display:grid;
  gap:16px;
  padding:20px;
  background:linear-gradient(180deg, #fff 0%, #f9fbff 100%);
  border:1px solid var(--line);
  border-radius:24px;
  box-shadow:var(--shadow-soft);
}
.control-center-upload-grid{
  display:grid;
  gap:14px;
  grid-template-columns:minmax(0,1.15fr) minmax(280px,.85fr);
}
.control-center-upload-dropzone{
  display:grid;
  gap:10px;
  align-content:center;
  justify-items:start;
  min-height:172px;
  padding:20px;
  border-radius:24px;
  border:2px dashed #b6c8ea;
  background:
    linear-gradient(180deg, rgba(255,255,255,.94) 0%, rgba(238,244,255,.96) 100%);
  color:var(--muted);
  user-select:none;
  transition:border-color .16s ease,transform .16s ease,background .16s ease;
}
.control-center-upload-dropzone:hover,
.control-center-upload-dropzone:focus{
  border-color:#84a9f8;
  background:#f7faff;
  transform:translateY(-1px);
}
.upload-dropzone-actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px 12px;
  align-items:center;
}
.upload-caption{
  font-size:12px;
  color:var(--muted);
}
.upload-queue-shell{
  display:grid;
  gap:12px;
  align-content:start;
  padding:14px;
  border:1px solid #dde7f6;
  border-radius:20px;
  background:rgba(255,255,255,.92);
}
.upload-queue-head{
  display:grid;
  gap:4px;
}
.upload-queue-list{
  display:grid;
  gap:10px;
}
.upload-queue-empty{
  margin:0;
  padding:14px 16px;
  border:1px dashed #c8d8f0;
  border-radius:18px;
  background:#f7faff;
  color:var(--muted);
  font-size:12px;
}
.upload-queue-item{
  display:grid;
  gap:12px;
  padding:14px 16px;
  border-radius:18px;
  border:1px solid #dbe5f6;
  background:#fff;
  box-shadow:var(--shadow-soft);
}
.upload-queue-item-head,
.upload-queue-item-footer{
  display:flex;
  gap:10px;
  align-items:flex-start;
  justify-content:space-between;
}
.upload-queue-item-title{
  display:block;
  font-size:13px;
  line-height:1.35;
  color:var(--text);
}
.upload-queue-item-meta{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  font-size:11px;
  color:var(--muted);
}
.upload-queue-status{
  display:inline-flex;
  align-items:center;
  min-height:24px;
  padding:4px 10px;
  border-radius:999px;
  background:#edf4ff;
  color:var(--primary);
  font-size:11px;
  font-weight:800;
  letter-spacing:.04em;
}
.upload-queue-progress-grid{
  display:grid;
  gap:10px;
}
.upload-queue-progress-group{
  display:grid;
  gap:6px;
}
.upload-queue-progress-label{
  font-size:10px;
  font-weight:800;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--muted);
}
.upload-queue-link{
  font-size:12px;
  color:var(--muted);
}
.upload-progress-wrap{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
}
.upload-progress-track{
  flex:1 1 auto;
  width:auto;
  height:8px;
  border-radius:999px;
  background:#e8eef7;
  overflow:hidden;
}
.upload-progress-fill{
  height:100%;
  width:0;
  border-radius:999px;
  background:linear-gradient(90deg, #2463eb 0%, #5b8dff 100%);
}
.upload-progress-label{
  font-size:11px;
  font-weight:700;
  color:var(--muted);
}
.upload-progress-pill{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:5px 10px;
  border-radius:999px;
  background:var(--primary-soft);
  color:var(--primary);
  font-size:11px;
  font-weight:800;
  letter-spacing:.08em;
}
.recordings-panel{
  display:grid;
  gap:14px;
}
.recordings-panel-frame{
  border:1px solid var(--line);
  border-radius:24px;
  background:linear-gradient(180deg, #fff 0%, #f9fbff 100%);
  padding:20px;
  box-shadow:var(--shadow-soft);
}
.recordings-filter-strip{
  display:grid;
  gap:10px;
  grid-template-columns:minmax(150px,.85fr) minmax(0,1.4fr) minmax(110px,.55fr) auto;
  align-items:end;
  padding:12px 14px;
  border:1px solid #dde7f6;
  border-radius:20px;
  background:rgba(255,255,255,.88);
}
.recordings-filter-strip .filters{align-items:flex-end}
.filter-field{
  display:grid;
  gap:6px;
  min-width:0;
}
.filter-field-grow{min-width:0}
.recordings-filter-actions{
  display:flex;
  gap:8px;
  align-items:center;
  justify-content:flex-end;
}
.control-center-worklist-summary{
  display:grid;
  gap:2px;
  justify-items:end;
  min-width:120px;
}
.control-center-worklist-count{
  font-size:1.7rem;
  line-height:1;
  font-weight:800;
  letter-spacing:-.04em;
  color:var(--navy);
}
.control-center-worklist-label{
  font-size:11px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--muted);
}
.recordings-status-strip{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}
.recordings-status-strip-label{
  font-size:10px;
  font-weight:800;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--muted);
}
.recordings-status-pills{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.recordings-status-pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#fff;
  text-decoration:none;
  color:var(--text);
  box-shadow:none;
  font-size:12px;
}
.recordings-status-pill:hover{
  background:#f8fbff;
  border-color:#9db4da;
}
.recordings-status-pill.active{
  background:var(--primary-soft);
  border-color:#b8cdfb;
}
.recordings-status-pill-label{
  font-weight:700;
}
.recordings-status-pill-count{
  font-size:13px;
  font-weight:800;
}
.recordings-table-wrap{
  overflow:auto;
  border:1px solid #dbe5f6;
  border-radius:20px;
  background:#fff;
}
.recordings-table{
  min-width:1020px;
}
.recordings-table td{vertical-align:top}
.recording-row-selected{
  background:linear-gradient(90deg, rgba(36,99,235,.08) 0%, rgba(255,255,255,1) 68%);
}
.recordings-table .recording-row-selected td:first-child{
  border-left:4px solid var(--primary);
}
.recording-main{
  display:grid;
  gap:6px;
}
.recording-title-row{
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
}
.recording-name{
  font-weight:700;
  color:var(--text);
  text-decoration:none;
}
.recording-row-selected .recording-name{color:var(--primary)}
.recording-meta{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  font-size:12px;
  color:var(--muted);
}
.recording-row-action{
  display:flex;
  align-items:center;
}
.recording-select-link{
  font-size:12px;
  font-weight:700;
  color:var(--primary);
  text-decoration:none;
}
.recording-select-link:hover{text-decoration:underline}
.recording-status-cell{
  display:grid;
  gap:8px;
}
.recording-status-note{
  font-size:12px;
  line-height:1.4;
  color:var(--muted);
}
.recording-progress{
  display:grid;
  gap:6px;
}
.recording-progress-note{
  font-size:12px;
  color:var(--muted);
}
.progress-track{
  height:7px;
  border-radius:999px;
  background:#e8eef7;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg, #2463eb 0%, #5b8dff 100%);
}
.recording-selected-flag{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:11px;
  font-weight:800;
  color:var(--primary);
  text-transform:uppercase;
  letter-spacing:.08em;
  padding:4px 8px;
  border-radius:999px;
  background:rgba(36,99,235,.08);
}
.recording-selected-flag::before{
  content:"";
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--primary);
}
.recording-source-cell{
  display:grid;
  gap:4px;
}
.recording-source-note{
  font-size:11px;
  color:var(--muted);
}
.control-center-system-bar{
  position:sticky;
  bottom:10px;
  z-index:40;
  display:grid;
  gap:12px;
  padding:14px 16px;
  border-radius:24px;
  border:1px solid rgba(30,41,59,.18);
  background:rgba(15,23,42,.94);
  color:#d9e5f8;
  box-shadow:0 20px 48px rgba(15,23,42,.24);
  backdrop-filter:blur(18px);

}
.control-center-system-group{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.control-center-system-group-secondary{justify-content:flex-end}
.control-center-system-item{
  display:grid;
  gap:4px;
  min-width:170px;
  padding:10px 12px;
  border-radius:18px;
  border:1px solid rgba(148,163,184,.18);
  background:rgba(255,255,255,.04);
}
.control-center-system-item--neutral{
  background:rgba(255,255,255,.04);
  border-color:rgba(148,163,184,.18);
}
.control-center-system-item--healthy{
  background:rgba(22,101,52,.18);
  border-color:rgba(134,239,172,.28);
}
.control-center-system-item--busy,
.control-center-system-item--degraded{
  background:rgba(180,83,9,.16);
  border-color:rgba(251,191,36,.3);
}
.control-center-system-item--offline{
  background:rgba(127,29,29,.24);
  border-color:rgba(248,113,113,.32);
}
.control-center-system-label{
  font-size:10px;
  font-weight:800;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:#93aac8;
}
.control-center-system-item--healthy .control-center-system-label{color:#b9ebc8}
.control-center-system-item--busy .control-center-system-label,
.control-center-system-item--degraded .control-center-system-label{color:#f7d18b}
.control-center-system-item--offline .control-center-system-label{color:#f6b0b0}
.control-center-system-value{
  font-size:14px;
  font-weight:700;
  color:#fff;
  overflow-wrap:anywhere;
}
.control-center-system-item--healthy .control-center-system-value{color:#f0fdf4}
.control-center-system-item--busy .control-center-system-value,
.control-center-system-item--degraded .control-center-system-value{color:#fff7d6}
.control-center-system-item--offline .control-center-system-value{color:#fee2e2}
.control-center-system-detail{
  font-size:11px;
  color:#b7c6db;
}
.control-center-system-item--healthy .control-center-system-detail{color:#d5f3de}
.control-center-system-item--busy .control-center-system-detail,
.control-center-system-item--degraded .control-center-system-detail{color:#f8dfae}
.control-center-system-item--offline .control-center-system-detail{color:#fecaca}
.control-center-system-note{
  margin:0;
  font-size:11px;
  color:#93aac8;
}
.inspector-shell{
  display:grid;
  gap:16px;
}
.inspector-shell-full{
  background:transparent;
}
.inspector-hero,
.inspector-section-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:24px;
  box-shadow:var(--shadow);
}
.inspector-hero{
  padding:22px;
  display:grid;
  gap:16px;
}
.inspector-hero.embedded{
  padding:18px;
  gap:14px;
  box-shadow:none;
}
.inspector-heading{
  display:flex;
  justify-content:space-between;
  gap:18px;
  align-items:flex-start;
  flex-wrap:wrap;
}
.inspector-title-block{
  display:grid;
  gap:8px;
}
.inspector-title-block h2,
.inspector-title-block h1{
  max-width:18ch;
  overflow-wrap:anywhere;
}
.inspector-subtitle{
  color:var(--muted);
  font-size:13px;
}
.inspector-meta-grid{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.inspector-meta-chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:7px 10px;
  border-radius:999px;
  border:1px solid var(--line);
  background:var(--panel-soft);
  color:var(--muted);
  font-size:12px;
  font-weight:700;
}
.inspector-action-bar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}
.inspector-action-bar-embedded{
  padding-top:2px;
}
.inspector-progress-shell{
  padding:14px 16px;
  border-radius:18px;
  border:1px solid #dbe5f6;
  background:#f7faff;
}
.inspector-tab-shell{
  display:grid;
  gap:14px;
}
.embedded-panel-grid,
.review-card-grid,
.metric-card-grid{
  display:grid;
  gap:14px;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
}
.review-card,
.metric-card,
.embedded-card,
.speaker-decision-card{
  border:1px solid var(--line);
  border-radius:18px;
  background:var(--panel-soft);
  padding:16px;
}
.review-card h3,
.metric-card h3,
.embedded-card h3,
.speaker-decision-card h3{margin-bottom:10px}
.embedded-card-head{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  flex-wrap:wrap;
  margin-bottom:12px;
}
.embedded-card-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.inspector-answer{
  margin:0 0 8px 0;
  font-size:1.1rem;
  font-weight:800;
  color:var(--text);
  line-height:1.3;
}
.compact-metadata-grid{
  display:grid;
  gap:12px;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
}
.compact-metadata-item{
  display:grid;
  gap:6px;
  padding:12px 14px;
  border-radius:16px;
  border:1px solid var(--line);
  background:#fff;
}
.compact-metadata-label{
  color:var(--muted);
  font-size:11px;
  font-weight:700;
  letter-spacing:.06em;
  text-transform:uppercase;
}
.compact-metadata-value{
  color:var(--text);
  font-size:14px;
  line-height:1.4;
}
.compact-export-text{
  width:100%;
  min-height:220px;
  resize:vertical;
  padding:14px;
  border:1px solid var(--line);
  border-radius:18px;
  background:#f8fbff;
  font:12px/1.55 "Courier New", monospace;
}
.speaker-review-list{
  display:grid;
  gap:14px;
}
.speaker-card{
  border:1px solid var(--line);
  border-radius:20px;
  background:var(--panel);
  padding:16px;
  display:grid;
  gap:14px;
  box-shadow:var(--shadow-soft);
}
.speaker-card-head{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
  flex-wrap:wrap;
}
.speaker-card-title{
  display:flex;
  gap:10px;
  align-items:center;
}
.speaker-avatar{
  display:grid;
  place-items:center;
  width:38px;
  height:38px;
  border-radius:14px;
  background:var(--primary-soft);
  color:var(--primary);
  font-weight:800;
}
.speaker-card-meta{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  color:var(--muted);
  font-size:12px;
}
.speaker-actions-grid{
  display:grid;
  gap:12px;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
}
.speaker-audio-list{
  display:grid;
  gap:10px;
}
.speaker-audio-clip{
  border:1px solid var(--line);
  border-radius:14px;
  background:#fff;
  padding:12px;
}
.speaker-section-label{
  color:var(--muted);
  font-size:11px;
  font-weight:700;
  letter-spacing:.06em;
  text-transform:uppercase;
}
.speaker-review-shell{
  gap:16px;
}
.speaker-review-shell-full .speaker-review-shell-body{
  display:grid;
  gap:14px;
  grid-template-columns:minmax(0,1.45fr) minmax(280px,.95fr);
  align-items:start;
}
.speaker-review-shell-compact .speaker-review-shell-body{
  display:grid;
  gap:14px;
}
.speaker-review-primary{
  display:grid;
  gap:12px;
}
.speaker-context-grid{
  display:grid;
  gap:12px;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
}
.speaker-context-card{
  display:grid;
  gap:8px;
}
.speaker-context-title{
  margin:0;
  font-size:1.05rem;
  font-weight:800;
  color:var(--text);
}
.speaker-card-title h3{
  margin:0;
}
.speaker-status-stack{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}
.speaker-cue-text{
  margin:0;
  padding:10px 12px;
  border-radius:14px;
  background:#fff;
  border:1px solid var(--line);
  color:var(--text);
  font-size:13px;
  line-height:1.55;
}
.speaker-snippet-panel{
  border:1px solid var(--line);
  border-radius:18px;
  background:var(--panel-soft);
  padding:16px;
  display:grid;
  gap:12px;
}
.speaker-snippet-panel h4{
  margin:0 0 4px 0;
  font-size:1rem;
}
.speaker-snippet-panel-head{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  flex-wrap:wrap;
}
.speaker-snippet-grid{
  display:grid;
  gap:12px;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
}
.speaker-review-shell-compact .speaker-snippet-grid{
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
}
.speaker-snippet-card{
  border:1px solid var(--line);
  border-radius:16px;
  background:#fff;
  padding:12px;
  display:grid;
  gap:10px;
}
.speaker-snippet-card-recommended{
  border-color:#bfd5ff;
  box-shadow:0 0 0 1px #dbeafe inset;
}
.speaker-snippet-card-head,
.speaker-action-head{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
  flex-wrap:wrap;
}
.speaker-chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  min-height:24px;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid var(--line);
  background:#fff;
  color:var(--text);
  font-size:11px;
  font-weight:700;
}
.speaker-chip-ready{
  border-color:#bfdbfe;
  background:#eff6ff;
  color:var(--primary);
}
.speaker-chip-quality{
  border-color:#dbeafe;
  background:#eef4ff;
  color:#1d4ed8;
}
.speaker-chip-muted{
  color:var(--muted);
}
.speaker-snippet-meta,
.speaker-snippet-choice{
  margin:0;
  color:var(--muted);
  font-size:12px;
}
.speaker-snippet-cue{
  margin:0;
  padding:10px 12px;
  border-radius:14px;
  background:#f8fbff;
  color:var(--text);
  font-size:13px;
  line-height:1.5;
}
.speaker-snippet-audio{
  width:100%;
  min-width:0;
}
.speaker-snippet-empty{
  border:1px dashed var(--line-strong);
  border-radius:16px;
  background:#fff;
  padding:14px;
}
.speaker-snippet-empty-title{
  margin:0 0 6px 0;
  font-size:13px;
  font-weight:800;
  color:var(--text);
}
.speaker-warning-list{
  display:grid;
  gap:6px;
}
.speaker-warning,
.speaker-warning-inline{
  margin:0;
  color:#92400e;
  font-size:12px;
}
.speaker-action-stack{
  display:grid;
  gap:12px;
}
.speaker-review-shell-full .speaker-action-stack{
  grid-template-columns:1fr;
}
.speaker-review-shell-compact .speaker-action-stack{
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
}
.speaker-decision-card-primary{
  background:#f7faff;
}
.speaker-decision-card-secondary{
  border-style:dashed;
  background:#fffdf5;
}
.speaker-form-stack{
  display:grid;
  gap:10px;
}
.speaker-form-stack select,
.speaker-form-stack input{
  width:100%;
}
.speaker-action-submit{
  width:100%;
}
.speaker-action-submit-primary{
  border-color:#bfd5ff;
  background:#eff6ff;
  color:var(--primary);
}
.speaker-trusted-sample-state{
  margin-bottom:10px;
  padding:10px 12px;
  border:1px solid var(--line);
  border-radius:14px;
  background:#fff;
}
.speaker-note,
.inspector-note{
  color:var(--muted);
  font-size:12px;
}
.page-notice{
  border:1px solid #dbe5f6;
  background:#f7faff;
  color:var(--text);
  border-radius:16px;
  padding:12px 14px;
}
.detail-page-shell{
  display:grid;
  gap:20px;
}
@media (max-width: 1180px){
  .control-center-workspace-header,
  .control-center-main{grid-template-columns:1fr}
  .control-center-inspector-pane{
    position:static;

  }
  .control-center-system-group-secondary{justify-content:flex-start}
}
@media (max-width: 860px){
  .app-nav{align-items:flex-start;flex-direction:column}
  .app-nav-links{width:100%}
  .control-center-shell{padding-bottom:0}
  .control-center-focus-topline,
  .control-center-focus-actions{justify-content:flex-start}
  .control-center-upload-grid{grid-template-columns:1fr}
  .recordings-filter-strip{grid-template-columns:1fr}
  .recordings-filter-actions{justify-content:flex-start}
  .control-center-worklist-summary{justify-items:start}
  .control-center-system-bar{position:static}
  .filters{flex-direction:column;align-items:stretch}
  .filter-field,.filter-field-grow{width:100%}
  .form-row{align-items:stretch}
  .form-row label{min-width:0}
  .inspector-heading{flex-direction:column}
  .tabs{overflow:auto;flex-wrap:nowrap;padding-bottom:10px}
  .speaker-review-shell-full .speaker-review-shell-body,
  .speaker-review-shell-compact .speaker-action-stack,
  .speaker-context-grid,
  .speaker-snippet-grid{grid-template-columns:1fr}
  .speaker-card-title{align-items:flex-start}
}
</style>
</head>

<div
  id="delete-confirm-backdrop"
  class="modal-backdrop"
  hidden
  onclick="if (event.target === this) closeDeleteDialog();"
>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="delete-confirm-title">
    <h2 id="delete-confirm-title">Delete record?</h2>
    <p class="modal-copy">This action can&apos;t be undone.</p>
    <p id="delete-confirm-context" class="modal-context"></p>
    <p id="delete-confirm-error" class="modal-error"></p>
    <div class="modal-actions">
      <button id="delete-cancel-btn" class="btn" type="button" onclick="closeDeleteDialog()">Cancel</button>
      <button id="delete-confirm-btn" class="btn btn-danger" type="button" onclick="confirmDeleteDialog()">Delete</button>
    </div>
  </div>
</div>
<script>
var deleteDialogState = {recordingId: '', inFlight: false, returnFocus: null, returnTo: ''};

function syncControlCenterShellRefreshUrlsFromPanel() {
  var panel = document.getElementById('control-center-recordings-panel');
  if (!panel) {
    return;
  }
  var workspaceHeaderUrl = panel.getAttribute('data-workspace-header-url');
  var systemBarUrl = panel.getAttribute('data-system-bar-url');
  var header = document.getElementById('control-center-workspace-header');
  var systemBar = document.getElementById('control-center-system-bar');
  if (header && workspaceHeaderUrl) {
    header.setAttribute('hx-get', workspaceHeaderUrl);
  }
  if (systemBar && systemBarUrl) {
    systemBar.setAttribute('hx-get', systemBarUrl);
  }
}

function syncControlCenterShellRefreshUrlsFromStateParams(stateParams) {
  if (!stateParams) {
    return;
  }
  var normalizedParams = new URLSearchParams();
  normalizedParams.set('selected', stateParams.get('selected') || '');
  normalizedParams.set('status', stateParams.get('status') || '');
  normalizedParams.set('q', stateParams.get('q') || '');
  normalizedParams.set('tab', stateParams.get('tab') || 'overview');
  normalizedParams.set('limit', stateParams.get('limit') || '25');
  normalizedParams.set('offset', stateParams.get('offset') || '0');
  var workspaceHeaderUrl = '/ui/control-center/workspace-header?' + normalizedParams.toString();
  var systemBarUrl = '/ui/control-center/system-bar?' + normalizedParams.toString();
  var panel = document.getElementById('control-center-recordings-panel');
  var header = document.getElementById('control-center-workspace-header');
  var systemBar = document.getElementById('control-center-system-bar');
  if (panel) {
    panel.setAttribute('data-workspace-header-url', workspaceHeaderUrl);
    panel.setAttribute('data-system-bar-url', systemBarUrl);
  }
  if (header) {
    header.setAttribute('hx-get', workspaceHeaderUrl);
  }
  if (systemBar) {
    systemBar.setAttribute('hx-get', systemBarUrl);
  }
}

function syncControlCenterShellRefreshUrlsFromHref(href) {
  if (!href) {
    syncControlCenterShellRefreshUrlsFromStateParams(new URLSearchParams(window.location.search || ''));
    return;
  }
  syncControlCenterShellRefreshUrlsFromStateParams(
    new URL(href, window.location.origin).searchParams
  );
}

function refreshControlCenterShellFromPanel() {
  syncControlCenterShellRefreshUrlsFromPanel();
  if (!window.htmx || !document.body) {
    return;
  }
  htmx.trigger(document.body, 'refresh-control-center-header');
  htmx.trigger(document.body, 'refresh-control-center-system-bar');
}

function refreshControlCenterShellFromHref(href) {
  syncControlCenterShellRefreshUrlsFromHref(href);
  if (!window.htmx || !document.body) {
    return;
  }
  htmx.trigger(document.body, 'refresh-control-center-header');
  htmx.trigger(document.body, 'refresh-control-center-system-bar');
}

if (document.body && !window.__controlCenterShellAfterSwapBound) {
  document.body.addEventListener('htmx:afterSwap', function (event) {
    var target = event && event.detail ? event.detail.target : null;
    if (!target) {
      return;
    }
    if (target.id === 'control-center-recordings-panel') {
      refreshControlCenterShellFromPanel();
      return;
    }
    if (target.id !== 'control-center-inspector-pane') {
      return;
    }
    var activeTab = target.querySelector('.tab.active');
    refreshControlCenterShellFromHref(activeTab ? activeTab.getAttribute('href') : '');
  });
  window.__controlCenterShellAfterSwapBound = true;
}

function refreshControlCenterPanels(options) {
  var params = new URLSearchParams(window.location.search || '');
  if (
    options &&
    options.clearSelected &&
    params.get('selected') === options.clearSelected
  ) {
    params.delete('selected');
    window.location = params.toString() ? ('/?' + params.toString()) : '/';
    return;
  }
  if (!window.htmx || !document.body) {
    return;
  }
  htmx.trigger(document.body, 'refresh-control-center-recordings');
  htmx.trigger(document.body, 'refresh-control-center-summary');
  htmx.trigger(document.body, 'refresh-control-center-inspector');
}

function recordingActionUrl(recordingId, action, returnTo) {
  var url = '/ui/recordings/' + encodeURIComponent(recordingId) + '/' + action;
  if (returnTo) {
    url += '?return_to=' + encodeURIComponent(returnTo);
  }
  return url;
}

function _deleteDialogElements() {
  return {
    backdrop: document.getElementById('delete-confirm-backdrop'),
    context: document.getElementById('delete-confirm-context'),
    error: document.getElementById('delete-confirm-error'),
    cancelBtn: document.getElementById('delete-cancel-btn'),
    confirmBtn: document.getElementById('delete-confirm-btn')
  };
}

function _deleteDialogContext(meta) {
  var details = [];
  if (meta.recordingLabel) details.push(meta.recordingLabel);
  if (meta.capturedAt) details.push(meta.capturedAt);
  details.push('ID: ' + meta.recordingId);
  return details.join(' | ');
}

function openDeleteDialog(meta) {
  if (!meta || !meta.recordingId) return;
  var el = _deleteDialogElements();
  if (!el.backdrop) return;
  deleteDialogState.recordingId = meta.recordingId;
  deleteDialogState.inFlight = false;
  deleteDialogState.returnFocus = meta.returnFocus || null;
  deleteDialogState.returnTo = meta.returnTo || '';
  el.context.textContent = _deleteDialogContext(meta);
  el.error.textContent = '';
  el.confirmBtn.disabled = false;
  el.cancelBtn.disabled = false;
  el.confirmBtn.textContent = 'Delete';
  el.backdrop.hidden = false;
  window.setTimeout(function() {
    el.cancelBtn.focus();
  }, 0);
}

function closeDeleteDialog() {
  var el = _deleteDialogElements();
  if (!el.backdrop || deleteDialogState.inFlight) return;
  var focusTarget = deleteDialogState.returnFocus;
  el.backdrop.hidden = true;
  deleteDialogState.recordingId = '';
  deleteDialogState.returnFocus = null;
  deleteDialogState.returnTo = '';
  if (focusTarget && typeof focusTarget.focus === 'function') {
    focusTarget.focus();
  }
}

function confirmDeleteDialog() {
  var el = _deleteDialogElements();
  if (!deleteDialogState.recordingId || deleteDialogState.inFlight) return;
  var targetId = deleteDialogState.recordingId;
  deleteDialogState.inFlight = true;
  el.error.textContent = '';
  el.confirmBtn.disabled = true;
  el.cancelBtn.disabled = true;
  el.confirmBtn.textContent = 'Deleting...';

  fetch(recordingActionUrl(targetId, 'delete', deleteDialogState.returnTo), {
    method: 'POST',
    headers: {'HX-Request': 'true'}
  })
    .then(function(resp) {
      return resp.text().then(function(body) {
        return {resp: resp, body: body};
      });
    })
    .then(function(result) {
      if (!result.resp.ok) {
        throw new Error(result.body || ('Delete failed (' + result.resp.status + ').'));
      }
      if (deleteDialogState.returnTo === 'control-center') {
        var deletedRecordingId = deleteDialogState.recordingId;
        deleteDialogState.inFlight = false;
        el.backdrop.hidden = true;
        deleteDialogState.recordingId = '';
        deleteDialogState.returnFocus = null;
        deleteDialogState.returnTo = '';
        refreshControlCenterPanels({clearSelected: deletedRecordingId});
        return;
      }
      var redirect = result.resp.headers.get('HX-Redirect');
      if (redirect) {
        window.location = redirect;
        return;
      }
      window.location = '/recordings';
    })
    .catch(function(err) {
      deleteDialogState.inFlight = false;
      el.confirmBtn.disabled = false;
      el.cancelBtn.disabled = false;
      el.confirmBtn.textContent = 'Delete';
      el.error.textContent = err && err.message ? err.message : 'Delete failed.';
      el.cancelBtn.focus();
    });
}

if (!window.__deleteDialogEscapeBound) {
  document.addEventListener('keydown', function(evt) {
    var el = _deleteDialogElements();
    if (evt.key === 'Escape' && el.backdrop && !el.backdrop.hidden) {
      evt.preventDefault();
      closeDeleteDialog();
    }
  });
  window.__deleteDialogEscapeBound = true;
}

function postControlCenterAction(sel, action) {
  var id = sel.dataset.rid;
  var returnTo = sel.dataset.returnTo || '';
  if (!id || !returnTo) {
    return;
  }
  sel.disabled = true;
  fetch(recordingActionUrl(id, action, returnTo), {
    method: 'POST',
    headers: {'HX-Request': 'true'}
  })
    .then(function(resp) {
      return resp.text().then(function(body) {
        return {resp: resp, body: body};
      });
    })
    .then(function(result) {
      if (!result.resp.ok) {
        throw new Error(result.body || ('Action failed (' + result.resp.status + ').'));
      }
      refreshControlCenterPanels();
    })
    .catch(function(err) {
      window.alert(err && err.message ? err.message : 'Action failed.');
    })
    .finally(function() {
      sel.disabled = false;
    });
}

function triggerRecordingAction(btn) {
  if (!btn || btn.disabled) return;
  var url = btn.dataset.actionUrl || '';
  if (!url) return;
  var confirmMessage = btn.dataset.confirmMessage || '';
  if (confirmMessage && !confirm(confirmMessage)) {
    return;
  }
  var returnTo = btn.dataset.returnTo || '';
  var body = btn.dataset.actionBody || '';
  var headers = {'HX-Request': 'true'};
  if (body) {
    headers['Content-Type'] = 'application/x-www-form-urlencoded';
  }
  var originalText = btn.textContent;
  var pendingLabel = btn.dataset.pendingLabel || originalText;
  btn.disabled = true;
  btn.textContent = pendingLabel;
  fetch(url, {
    method: 'POST',
    headers: headers,
    body: body || undefined
  })
    .then(function(resp) {
      return resp.text().then(function(payload) {
        return {resp: resp, body: payload};
      });
    })
    .then(function(result) {
      if (!result.resp.ok) {
        throw new Error(result.body || ('Action failed (' + result.resp.status + ').'));
      }
      if (returnTo === 'control-center') {
        refreshControlCenterPanels();
        return;
      }
      var redirect = result.resp.headers.get('HX-Redirect');
      if (redirect) {
        window.location = redirect;
        return;
      }
      window.location.reload();
    })
    .catch(function(err) {
      window.alert(err && err.message ? err.message : 'Action failed.');
    })
    .finally(function() {
      if (document.body.contains(btn)) {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    });
}

function doRecAction(sel) {
  var act = sel.value;
  var id = sel.dataset.rid;
  sel.value = '';
  if (!act || !id) return;
  if (act === 'open') {
    window.location = sel.dataset.openHref || ('/recordings/' + encodeURIComponent(id));
    return;
  }
  if (act === 'delete') {
    openDeleteDialog({
      recordingId: id,
      recordingLabel: sel.dataset.rlabel || '',
      capturedAt: sel.dataset.rcaptured || '',
      returnTo: sel.dataset.returnTo || '',
      returnFocus: sel
    });
    return;
  } else if (act === 'quarantine' && !confirm('Quarantine this recording?')) {
    return;
  }
  if (sel.dataset.returnTo === 'control-center') {
    postControlCenterAction(sel, act);
    return;
  }
  htmx.ajax('POST', '/ui/recordings/' + encodeURIComponent(id) + '/' + act, {swap: 'none'});
}
</script>
