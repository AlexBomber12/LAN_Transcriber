<section class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
  <div class="p-5 border-b border-slate-100 flex flex-wrap justify-between items-center gap-4">
    <h3 class="text-base font-bold text-slate-900">Export</h3>
    <div class="flex items-center gap-2">
      <button type="button" class="px-3 py-1.5 bg-white border border-slate-200 text-xs font-bold rounded hover:bg-slate-50 transition-colors" onclick="copyInspectorFieldText('export-text', 'export-copy-status', 'Copied export markdown.', 'Copy failed. Select the text and copy manually.')">Copy</button>
      <a
        href="/ui/recordings/{{ rec.id }}/export.zip"
        class="px-3 py-1.5 bg-white border border-slate-200 text-xs font-bold rounded hover:bg-slate-50 transition-colors no-underline text-slate-700"
        hx-boost="false"
      >Download ZIP</a>
    </div>
  </div>

  <div class="p-5">
    <textarea
      id="export-text"
      class="w-full h-96 bg-slate-50 border border-slate-200 rounded-lg p-4 font-mono text-xs text-slate-600 leading-relaxed resize-y focus:ring-1 focus:ring-primary focus:border-primary"
      readonly
    >{{ export_text or '' }}</textarea>
    <p id="export-copy-status" class="text-xs text-slate-500 mt-3">
      Copy the markdown or download the ZIP.
    </p>
  </div>
</section>

<script>
if (!window.copyInspectorFieldText) {
  window.copyInspectorFieldText = function(fieldId, statusId, successMessage, failureMessage) {
    var textarea = document.getElementById(fieldId);
    var status = document.getElementById(statusId);
    if (!textarea) return;
    var setStatus = function(message) {
      if (status) status.textContent = message;
    };
    var fallback = function() {
      textarea.focus();
      textarea.select();
      try {
        document.execCommand('copy');
        setStatus(successMessage);
      } catch (_err) {
        setStatus(failureMessage);
      }
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(textarea.value).then(
        function() { setStatus(successMessage); },
        fallback
      );
      return;
    }
    fallback();
  };
}
</script>
