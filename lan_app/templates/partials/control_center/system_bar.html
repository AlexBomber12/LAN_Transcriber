<footer
  id="control-center-system-bar"
  class="control-center-system-bar"
  hx-get="{{ control_center_state.system_bar_url }}"
  hx-trigger="every 15s, refresh-control-center-system-bar from:body"
  hx-target="this"
  hx-swap="outerHTML"
>
  {% for item in control_center_system_bar["items"] %}
  <div
    class="control-center-system-item control-center-system-item--{{ item.tone or 'neutral' }}"
    {% if item.detail %}title="{{ item.detail }}"{% endif %}
  >
    {% if item.show_dot %}
    <span class="control-center-system-dot" aria-hidden="true"></span>
    {% endif %}
    <span class="control-center-system-label">{{ item.label }}</span>
    <strong class="control-center-system-value">{{ item.value }}</strong>
  </div>
  {% endfor %}
</footer>
