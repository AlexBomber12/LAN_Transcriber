<div class="control-center-empty-state">
  <div class="control-center-empty-card">
    <p class="eyebrow">Compact inspector</p>
    <strong>{{ empty_inspector.title }}</strong>
    {% if empty_inspector.message %}
    <p class="control-center-empty-copy">{{ empty_inspector.message }}</p>
    {% endif %}
    <div class="control-center-empty-hints">
      <span class="control-center-empty-hint">Inbox context stays visible</span>
      <span class="control-center-empty-hint">Review blockers on the right</span>
      <span class="control-center-empty-hint">Open full page only for deep work</span>
    </div>
  </div>
</div>
