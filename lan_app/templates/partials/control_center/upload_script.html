<script>
var TERMINAL_STATUSES = new Set([
  "Ready",
  "NeedsReview",
  "Published",
  "Stopped",
  "Quarantine",
  "Failed",
]);
var uploadMode = {{ upload_shell.mode | tojson }};
var isControlCenterUpload = uploadMode === "control_center";
var removeTerminalItems = {{ upload_shell.remove_terminal_items | tojson }};
var showUploadEmptyState = {{ upload_shell.show_empty_state_text | tojson }};
var uploadEmptyStateText = {{ upload_shell.empty_state_text | tojson }};
var uploadItems = [];
var uploadQueue = [];
var queueRunning = false;
var compactCardLimit = {{ upload_shell.max_visible_cards | tojson }};

function formatSize(bytes) {
  var value = Number(bytes);
  if (!Number.isFinite(value) || value < 0) {
    return "—";
  }
  if (value < 1024) {
    return String(value) + " B";
  }
  var kb = value / 1024;
  if (kb < 1024) {
    return kb.toFixed(1) + " KB";
  }
  var mb = kb / 1024;
  if (mb < 1024) {
    return mb.toFixed(1) + " MB";
  }
  var gb = mb / 1024;
  return gb.toFixed(2) + " GB";
}

function makeProgressCell() {
  var wrap = document.createElement("div");
  wrap.className = "upload-progress-wrap";

  var bar = document.createElement("div");
  bar.className = "upload-progress-track";

  var fill = document.createElement("div");
  fill.className = "upload-progress-fill";
  bar.appendChild(fill);

  var label = document.createElement("span");
  label.className = "upload-progress-label";
  label.textContent = "0%";

  wrap.appendChild(bar);
  wrap.appendChild(label);
  return {node: wrap, fill: fill, label: label};
}

function normaliseDisplayPercent(percent) {
  var value = Number(percent);
  if (!Number.isFinite(value)) {
    value = 0;
  }
  if (value < 0) {
    value = 0;
  }
  if (value > 100) {
    value = 100;
  }
  return Math.round(value);
}

function setPercent(progress, percent) {
  var rounded = normaliseDisplayPercent(percent);
  if (progress && progress.fill && progress.label) {
    progress.fill.style.width = String(rounded) + "%";
    progress.label.textContent = String(rounded) + "%";
  }
  return rounded;
}

function setItemUploadPercent(item, percent) {
  if (!item) {
    return;
  }
  item.uploadPercent = setPercent(item.uploadProgress, percent);
}

function setItemProcessPercent(item, percent) {
  if (!item) {
    return;
  }
  item.processPercent = setPercent(item.processProgress, percent);
}

function setItemStatus(item, text) {
  if (!item) {
    return;
  }
  item.statusText = text;
  if (item.statusCell) {
    item.statusCell.textContent = text;
  }
}

function setUploadCounter(count) {
  if (!isControlCenterUpload) {
    return;
  }
  var counter = document.getElementById("{{ upload_shell.active_counter_id }}");
  if (!counter) {
    return;
  }
  counter.textContent = String(count) + " ACTIVE JOBS";
}

function removePlaceholderRow() {
  if (!showUploadEmptyState) {
    return;
  }
  var row = document.getElementById("{{ upload_shell.empty_row_id }}");
  if (row) {
    row.remove();
  }
}

function restorePlaceholderRow() {
  if (!showUploadEmptyState) {
    return;
  }
  var rows = document.getElementById("{{ upload_shell.upload_rows_id }}");
  if (!rows || rows.querySelector(".upload-queue-item")) {
    return;
  }
  if (document.getElementById("{{ upload_shell.empty_row_id }}")) {
    return;
  }
  var empty = document.createElement("div");
  empty.id = "{{ upload_shell.empty_row_id }}";
  empty.className = "upload-queue-empty";
  empty.textContent = uploadEmptyStateText;
  rows.appendChild(empty);
}

function activeUploadItems() {
  return uploadItems.filter(function(item) {
    return !item.removed && item.phase !== "terminal";
  });
}

function compactCardItems(items) {
  if (!isControlCenterUpload) {
    return [];
  }

  var active = null;
  var queued = null;
  var fallback = null;
  var idx = 0;

  for (idx = 0; idx < items.length; idx += 1) {
    if (items[idx].phase === "uploading") {
      active = items[idx];
      break;
    }
  }
  if (!active) {
    for (idx = 0; idx < items.length; idx += 1) {
      if (items[idx].phase === "processing") {
        active = items[idx];
        break;
      }
    }
  }
  if (!active && items.length > 0) {
    active = items[0];
  }
  for (idx = 0; idx < items.length; idx += 1) {
    if (items[idx] === active) {
      continue;
    }
    if (items[idx].phase === "queued") {
      queued = items[idx];
      break;
    }
    if (!fallback) {
      fallback = items[idx];
    }
  }

  var visible = [];
  if (active) {
    visible.push(active);
  }
  if (queued) {
    visible.push(queued);
  } else if (fallback) {
    visible.push(fallback);
  }
  return visible.slice(0, compactCardLimit || 2);
}

function compactCardPercent(item) {
  if (!item) {
    return 0;
  }
  if (item.phase === "queued") {
    return 0;
  }
  if (item.phase === "processing") {
    return item.processPercent;
  }
  return item.uploadPercent;
}

function compactCardStateText(item) {
  if (!item) {
    return "";
  }
  if (item.phase === "queued") {
    return "waiting in queue...";
  }
  return item.statusText || "Uploading";
}

function buildCompactQueueCard(item) {
  var percent = compactCardPercent(item);
  var isQueued = item.phase === "queued";

  var card = document.createElement("article");
  card.className = "upload-queue-card";
  if (isQueued) {
    card.className += " upload-queue-card--queued";
  }

  var head = document.createElement("div");
  head.className = "upload-queue-card-head";

  var title = document.createElement("strong");
  title.className = "upload-queue-card-title";
  title.textContent = item.file && item.file.name ? item.file.name : "(unnamed)";
  title.title = title.textContent;

  var status = document.createElement("span");
  status.className = "upload-queue-card-status";
  status.textContent = isQueued ? "Queued" : "Active";
  if (isQueued) {
    status.className += " upload-queue-card-status--queued";
  }

  head.appendChild(title);
  head.appendChild(status);

  var progressWrap = document.createElement("div");
  progressWrap.className = "upload-progress-wrap";

  var track = document.createElement("div");
  track.className = "upload-progress-track";
  if (isQueued) {
    track.className += " upload-progress-track-muted";
  }

  var fill = document.createElement("div");
  fill.className = "upload-progress-fill";
  if (isQueued) {
    fill.className += " upload-progress-fill-muted";
  }
  fill.style.width = String(percent) + "%";
  track.appendChild(fill);

  var label = document.createElement("span");
  label.className = "upload-progress-label";
  if (isQueued) {
    label.className += " upload-progress-label-muted";
    label.textContent = "queued";
  } else {
    label.textContent = String(percent) + "%";
  }

  progressWrap.appendChild(track);
  progressWrap.appendChild(label);

  var state = document.createElement("p");
  state.className = "upload-queue-card-state";
  state.textContent = compactCardStateText(item);

  card.appendChild(head);
  card.appendChild(progressWrap);
  card.appendChild(state);
  return card;
}

function syncCompactUploadView() {
  if (!isControlCenterUpload) {
    return;
  }
  var rows = document.getElementById("{{ upload_shell.upload_rows_id }}");
  if (!rows) {
    return;
  }

  var items = activeUploadItems();
  setUploadCounter(items.length);
  rows.textContent = "";

  compactCardItems(items).forEach(function(item) {
    rows.appendChild(buildCompactQueueCard(item));
  });
}

function removeUploadItem(item) {
  if (!item || item.removed) {
    return;
  }
  item.removed = true;
  if (item.itemNode) {
    item.itemNode.remove();
  }
  restorePlaceholderRow();
  syncCompactUploadView();
}

function scheduleUploadItemRemoval(item, delayMs) {
  if (!item || item.removed || item.removalTimer !== null) {
    return;
  }
  item.removalTimer = window.setTimeout(function() {
    removeUploadItem(item);
  }, delayMs);
}

function makeProgressGroup(labelText) {
  var wrap = document.createElement("div");
  wrap.className = "upload-queue-progress-group";

  var label = document.createElement("span");
  label.className = "upload-queue-progress-label";
  label.textContent = labelText;

  var progress = makeProgressCell();
  wrap.appendChild(label);
  wrap.appendChild(progress.node);

  return {node: wrap, progress: progress};
}

function addFileRow(file) {
  var item = {
    file: file,
    phase: "queued",
    statusText: "Queued for upload",
    uploadPercent: 0,
    processPercent: 0,
    itemNode: null,
    statusCell: null,
    linkCell: null,
    uploadProgress: null,
    processProgress: null,
    lastRefreshSignature: "",
    removalTimer: null,
    removed: false,
  };

  uploadItems.push(item);

  if (!isControlCenterUpload) {
    removePlaceholderRow();
    var rows = document.getElementById("{{ upload_shell.upload_rows_id }}");
    var itemNode = document.createElement("article");
    itemNode.className = "upload-queue-item";

    var head = document.createElement("div");
    head.className = "upload-queue-item-head";

    var titleWrap = document.createElement("div");
    titleWrap.className = "recording-main";

    var title = document.createElement("strong");
    title.className = "upload-queue-item-title";
    title.textContent = file.name || "(unnamed)";
    title.title = file.name || "";

    var meta = document.createElement("div");
    meta.className = "upload-queue-item-meta";

    var sizeMeta = document.createElement("span");
    sizeMeta.textContent = formatSize(file.size);
    meta.appendChild(sizeMeta);

    var queuedMeta = document.createElement("span");
    queuedMeta.textContent = "Queued";
    meta.appendChild(queuedMeta);

    titleWrap.appendChild(title);
    titleWrap.appendChild(meta);

    var statusCell = document.createElement("span");
    statusCell.className = "upload-queue-status";
    statusCell.textContent = item.statusText;

    head.appendChild(titleWrap);
    head.appendChild(statusCell);

    var progressGrid = document.createElement("div");
    progressGrid.className = "upload-queue-progress-grid";

    var uploadProgress = makeProgressGroup("Upload");
    progressGrid.appendChild(uploadProgress.node);

    var processProgress = makeProgressGroup("Processing");
    progressGrid.appendChild(processProgress.node);

    var footer = document.createElement("div");
    footer.className = "upload-queue-item-footer";

    var linkCell = document.createElement("div");
    linkCell.className = "upload-queue-link";
    linkCell.textContent = "Waiting for recording";
    footer.appendChild(linkCell);

    itemNode.appendChild(head);
    itemNode.appendChild(progressGrid);
    itemNode.appendChild(footer);
    rows.prepend(itemNode);

    item.itemNode = itemNode;
    item.statusCell = statusCell;
    item.linkCell = linkCell;
    item.uploadProgress = uploadProgress.progress;
    item.processProgress = processProgress.progress;
  }

  syncCompactUploadView();
  return item;
}

function normaliseProcessingPercent(value) {
  var number = Number(value);
  if (!Number.isFinite(number)) {
    return 0;
  }
  if (number < 0) {
    number = 0;
  }
  if (number > 1) {
    number = 1;
  }
  return Math.round(number * 100);
}

function parseJsonPayload(text) {
  var body = String(text || "").trim();
  if (!body) {
    return {};
  }
  try {
    var parsed = JSON.parse(body);
    if (parsed && typeof parsed === "object") {
      return parsed;
    }
  } catch (_err) {
    return {};
  }
  return {};
}

function payloadDetail(payload) {
  if (!payload || typeof payload !== "object") {
    return "";
  }
  if (typeof payload.detail === "string") {
    return payload.detail;
  }
  if (payload.detail && typeof payload.detail === "object") {
    return JSON.stringify(payload.detail);
  }
  return "";
}

function attachRecordingLink(item, recordingId) {
  if (!item || !item.linkCell) {
    return;
  }
  item.linkCell.textContent = "";
  var link = document.createElement("a");
  link.href = "/recordings/" + encodeURIComponent(recordingId);
  link.textContent = "Open recording";
  link.style.textDecoration = "none";
  link.style.color = "#1d4ed8";
  item.linkCell.appendChild(link);
}

function refreshControlCenterFromUpload() {
  if (typeof refreshControlCenterPanels === "function") {
    refreshControlCenterPanels();
  }
}

function startPolling(item, recordingId) {
  var stopped = false;
  var timer = null;

  function stop() {
    stopped = true;
    if (timer !== null) {
      clearInterval(timer);
      timer = null;
    }
  }

  async function pollOnce() {
    if (stopped) {
      return;
    }

    var response = null;
    try {
      response = await fetch("/api/recordings/" + encodeURIComponent(recordingId));
    } catch (_err) {
      setItemStatus(item, "polling failed");
      syncCompactUploadView();
      stop();
      return;
    }

    if (!response.ok) {
      setItemStatus(item, "polling failed");
      syncCompactUploadView();
      stop();
      return;
    }

    var recording = null;
    try {
      recording = await response.json();
    } catch (_err) {
      setItemStatus(item, "polling failed");
      syncCompactUploadView();
      stop();
      return;
    }

    var status = String(recording.status || "").trim() || "Unknown";
    var stage = String(recording.pipeline_stage || "").trim() || "Waiting";
    var processPercent = normaliseProcessingPercent(recording.pipeline_progress);
    var refreshSignature = status + ":" + stage + ":" + String(processPercent);

    setItemProcessPercent(item, processPercent);
    setItemStatus(item, status + " (" + stage + ")");
    item.phase = TERMINAL_STATUSES.has(status) ? "terminal" : "processing";
    syncCompactUploadView();
    if (item.lastRefreshSignature !== refreshSignature) {
      item.lastRefreshSignature = refreshSignature;
      refreshControlCenterFromUpload();
    }

    if (TERMINAL_STATUSES.has(status)) {
      stop();
      if (removeTerminalItems) {
        scheduleUploadItemRemoval(item, 1500);
      }
    }
  }

  pollOnce();
  timer = setInterval(pollOnce, 2000);
}

function uploadFile(item) {
  return new Promise(function(resolve) {
    var xhr = new XMLHttpRequest();
    xhr.open("POST", "/api/uploads");
    xhr.withCredentials = true;
    item.phase = "uploading";
    setItemStatus(item, "Uploading");
    syncCompactUploadView();

    xhr.upload.onprogress = function(event) {
      if (!event.lengthComputable || event.total <= 0) {
        return;
      }
      var percent = (event.loaded / event.total) * 100;
      setItemUploadPercent(item, percent);
      item.phase = "uploading";
      setItemStatus(item, "Uploading");
      syncCompactUploadView();
    };

    xhr.onerror = function() {
      item.phase = "terminal";
      setItemStatus(item, "Upload failed");
      syncCompactUploadView();
      if (removeTerminalItems) {
        scheduleUploadItemRemoval(item, 1800);
      }
      resolve();
    };

    xhr.onload = function() {
      var payload = parseJsonPayload(xhr.responseText);
      if (xhr.status < 200 || xhr.status >= 300) {
        var reason = payloadDetail(payload) || ("HTTP " + xhr.status);
        item.phase = "terminal";
        setItemStatus(item, "Upload failed: " + reason);
        syncCompactUploadView();
        if (removeTerminalItems) {
          scheduleUploadItemRemoval(item, 1800);
        }
        resolve();
        return;
      }

      var recordingId = String(payload.recording_id || "").trim();
      if (!recordingId) {
        item.phase = "terminal";
        setItemStatus(item, "Upload failed: missing recording_id");
        syncCompactUploadView();
        if (removeTerminalItems) {
          scheduleUploadItemRemoval(item, 1800);
        }
        resolve();
        return;
      }

      setItemUploadPercent(item, 100);
      item.phase = "processing";
      setItemStatus(item, "Uploaded");
      syncCompactUploadView();
      attachRecordingLink(item, recordingId);
      refreshControlCenterFromUpload();
      startPolling(item, recordingId);
      resolve();
    };

    var formData = new FormData();
    formData.append("file", item.file);
    xhr.send(formData);
  });
}

async function drainUploadQueue() {
  if (queueRunning) {
    return;
  }
  queueRunning = true;
  while (uploadQueue.length > 0) {
    var item = uploadQueue.shift();
    await uploadFile(item);
  }
  queueRunning = false;
}

function enqueueFiles(fileList) {
  if (!fileList || fileList.length === 0) {
    return;
  }
  for (var i = 0; i < fileList.length; i += 1) {
    var file = fileList[i];
    var row = addFileRow(file);
    uploadQueue.push(row);
  }
  drainUploadQueue();
}

syncCompactUploadView();

var fileInput = document.getElementById("{{ upload_shell.file_input_id }}");
var pickFilesButton = document.getElementById("{{ upload_shell.pick_files_button_id }}");
var dropzone = document.getElementById("{{ upload_shell.dropzone_id }}");

if (fileInput && pickFilesButton && dropzone && fileInput.dataset.uploadBound !== "1") {
  fileInput.dataset.uploadBound = "1";

  fileInput.addEventListener("change", function() {
    enqueueFiles(fileInput.files);
    fileInput.value = "";
  });

  pickFilesButton.addEventListener("click", function(event) {
    event.preventDefault();
    event.stopPropagation();
    fileInput.click();
  });

  function stopDragDefaults(event) {
    event.preventDefault();
    event.stopPropagation();
  }

  dropzone.addEventListener("dragenter", function(event) {
    stopDragDefaults(event);
    dropzone.style.borderColor = "#4a6080";
    dropzone.style.background = "#eef4ff";
  });

  dropzone.addEventListener("dragover", function(event) {
    stopDragDefaults(event);
    dropzone.style.borderColor = "#4a6080";
    dropzone.style.background = "#eef4ff";
  });

  dropzone.addEventListener("dragleave", function(event) {
    stopDragDefaults(event);
    dropzone.style.borderColor = "#b6c8ea";
    dropzone.style.background = "";
  });

  dropzone.addEventListener("drop", function(event) {
    stopDragDefaults(event);
    dropzone.style.borderColor = "#b6c8ea";
    dropzone.style.background = "";
    if (!event.dataTransfer) {
      return;
    }
    enqueueFiles(event.dataTransfer.files);
  });

  dropzone.addEventListener("click", function() {
    fileInput.click();
  });

  dropzone.addEventListener("keydown", function(event) {
    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      fileInput.click();
    }
  });
}
</script>
