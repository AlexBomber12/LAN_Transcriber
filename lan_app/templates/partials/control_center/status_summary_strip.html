<div class="space-y-3">
  <h2 class="text-sm font-bold">{{ summary_strip.title }}</h2>
  <div class="flex gap-3 flex-wrap">
    {% for status, count in summary_strip.counts.items() %}
    {% set s = status|lower %}
    <div class="bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-center min-w-[80px]">
      <div class="text-lg font-bold text-slate-700">{{ count }}</div>
      <div class="text-[10px] font-bold uppercase
        {% if s in ['ready', 'published', 'finished'] %}text-green-600
        {% elif s in ['processing', 'stopping', 'started'] %}text-amber-600
        {% elif s in ['failed', 'quarantine'] %}text-red-600
        {% elif s in ['needsreview'] %}text-amber-600
        {% elif s in ['queued'] %}text-blue-600
        {% elif s in ['stopped'] %}text-slate-600
        {% else %}text-slate-500
        {% endif %}
      ">{{ status }}</div>
    </div>
    {% endfor %}
  </div>
</div>
