<div class="recordings-status-pills">
  {% for card in recordings_panel.status_cards %}
  <a
    href="{{ card.href }}"
    class="recordings-status-pill{% if card.active %} active{% endif %}"
    {% if card.hx_get %}
    hx-get="{{ card.hx_get }}"
    hx-target="#{{ recordings_panel.panel_id }}"
    hx-swap="outerHTML"
    hx-on::after-request="if (event.detail.successful) { htmx.trigger(document.body, 'refresh-control-center-header'); htmx.trigger(document.body, 'refresh-control-center-system-bar'); }"
    {% endif %}
  >
    <span class="recordings-status-pill-count">{{ card.count }}</span>
    <span class="badge s-{{ card.status }}">{{ card.status }}</span>
  </a>
  {% endfor %}
</div>
