<div class="px-4 py-2 border-b border-slate-200 flex items-center gap-2 flex-wrap">
  <span class="text-[10px] font-bold uppercase text-slate-400 mr-1">Triage</span>
  {% for card in recordings_panel.status_cards %}
  <a
    href="{{ card.href }}"
    class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold border
      {% if card.active %}bg-primary/10 text-primary border-primary/30{% else %}bg-slate-50 text-slate-500 border-slate-200 hover:bg-slate-100{% endif %}"
    {% if card.hx_get %}
    hx-get="{{ card.hx_get }}"
    hx-target="#{{ recordings_panel.panel_id }}"
    hx-swap="outerHTML"
    {% endif %}
  >
    <span>{{ card.status }}</span>
    <span class="{% if card.active %}text-primary{% else %}text-slate-400{% endif %}">{{ card.count }}</span>
  </a>
  {% endfor %}
</div>
