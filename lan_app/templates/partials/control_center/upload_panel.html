<div class="control-center-upload-grid">
  <div>
    <input type="file" id="{{ upload_shell.file_input_id }}" multiple hidden>
    <div
      id="{{ upload_shell.dropzone_id }}"
      class="control-center-upload-dropzone"
      tabindex="0"
    >
      <h3>Upload</h3>
      <p class="upload-caption">Drop audio here or browse from disk.</p>
      <div class="upload-dropzone-actions">
        <button type="button" class="btn" id="{{ upload_shell.pick_files_button_id }}">Choose files</button>
        <span class="upload-caption">MP3, WAV, FLAC</span>
      </div>
    </div>
  </div>
  <div class="upload-queue-shell">
    <div class="upload-queue-head">
      <h3>{{ upload_shell.queue_title }}</h3>
      <p class="upload-caption">{{ upload_shell.queue_caption }}</p>
    </div>
    <div id="{{ upload_shell.upload_rows_id }}" class="upload-queue-list">
      <div id="{{ upload_shell.empty_row_id }}" class="upload-queue-empty">
        {{ upload_shell.empty_state_text }}
      </div>
    </div>
  </div>
</div>
