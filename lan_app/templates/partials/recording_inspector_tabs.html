{% if recording_inspector.embedded %}
<div class="flex gap-6 border-b border-slate-200">
  {% for inspector_tab in recording_inspector.tabs %}
  <a
    href="{{ inspector_tab.href }}"
    class="border-b-2 pb-3 text-sm font-bold whitespace-nowrap {% if inspector_tab.active %}border-primary text-primary{% else %}border-transparent text-slate-500 hover:text-slate-700{% endif %}"
    data-testid="recording-inspector-tab-{{ inspector_tab.value }}"
    {% if inspector_tab.active %}data-active-tab="true"{% endif %}
    {% if inspector_tab.hx_get %}
    hx-get="{{ inspector_tab.hx_get }}"
    hx-target="{{ inspector_tab.hx_target }}"
    hx-swap="{{ inspector_tab.hx_swap }}"
    hx-push-url="{{ inspector_tab.hx_push_url }}"
    {% endif %}
  >{{ inspector_tab.label }}</a>
  {% endfor %}
</div>
{% else %}
<div class="border-b border-slate-200 mb-6">
  <nav class="flex gap-8 overflow-x-auto">
    {% for inspector_tab in recording_inspector.tabs %}
    <a
      href="{{ inspector_tab.href }}"
      class="border-b-2 pb-3 text-sm font-bold whitespace-nowrap {% if inspector_tab.active %}border-primary text-primary{% else %}border-transparent text-slate-500 hover:text-slate-700{% endif %}"
      data-testid="recording-inspector-tab-{{ inspector_tab.value }}"
      {% if inspector_tab.active %}data-active-tab="true"{% endif %}
      {% if inspector_tab.hx_get %}
      hx-get="{{ inspector_tab.hx_get }}"
      hx-target="{{ inspector_tab.hx_target }}"
      hx-swap="{{ inspector_tab.hx_swap }}"
      hx-push-url="{{ inspector_tab.hx_push_url }}"
      {% endif %}
    >{{ inspector_tab.label }}</a>
    {% endfor %}
  </nav>
</div>
{% endif %}
