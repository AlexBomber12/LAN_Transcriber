name: tests+nolayer-smoke

on:
  pull_request:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]

jobs:
  unit-and-ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      docker:
        image: docker:24.0.9-dind
        options: --privileged
        env:
          DOCKER_TLS_CERTDIR: "/certs"
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify ci lockfile is up to date
        run: |
          python -m pip install "pip==24.3.1" "pip-tools==7.4.1"
          tmp_dir="$(mktemp -d)"
          cp ci-requirements.in "$tmp_dir/ci-requirements.in"
          (
            cd "$tmp_dir"
            pip-compile --output-file=ci-requirements.txt ci-requirements.in
          )
          diff -u ci-requirements.txt "$tmp_dir/ci-requirements.txt"
      - name: Run lint and tests
        env:
          CI: 'true'
        run: scripts/ci.sh
      - name: Upload htmlcov artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: htmlcov
          path: htmlcov/

  docker-smoke-pr:
    name: docker-smoke-pr
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build runtime-lite image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --file ./Dockerfile \
            --target runtime-lite \
            --tag lan-transcriber:pr \
            .
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install smoke test deps
        run: |
          python -m pip install -U pip
          python -m pip install pytest requests
      - name: Run docker smoke test
        run: |
          echo "Running docker smoke with SMOKE_IMAGE=lan-transcriber:pr"
          SMOKE_IMAGE=lan-transcriber:pr pytest -q tests/test_docker_smoke.py

  playwright-smoke:
    name: playwright-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r ci-requirements.txt
          python -m pip install -e .[test]
          python -m pip install playwright pytest requests
      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium
      - name: Run Playwright smoke test
        env:
          LAN_REDIS_URL: redis://127.0.0.1:6379/14
        run: pytest -q tests_playwright/test_ui_smoke_playwright.py
