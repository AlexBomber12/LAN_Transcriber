name: tests+nolayer-smoke

on:
  pull_request:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]

jobs:
  unit-and-ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      docker:
        image: docker:24.0.9-dind
        options: --privileged
        env:
          DOCKER_TLS_CERTDIR: "/certs"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run lint and tests
        env:
          CI: 'true'
        run: scripts/ci.sh
      - name: Upload htmlcov artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: htmlcov
          path: htmlcov/

  docker-smoke-pr:
    name: docker-smoke-pr
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build runtime-lite image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime-lite
          tags: lan-transcriber:pr
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install smoke test deps
        run: |
          python -m pip install -U pip
          python -m pip install pytest requests
      - name: Run docker smoke test
        run: |
          echo "Running docker smoke with SMOKE_IMAGE=lan-transcriber:pr"
          SMOKE_IMAGE=lan-transcriber:pr pytest -q tests/test_docker_smoke.py
